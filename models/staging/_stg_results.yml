version: 2

models:
  - name: stg_results
    description: >
      Staged race results with typed columns and derived boolean flags
      (won_race, podium_finish, points_finish, finished_race).
    columns:
      - name: result_id
        tests: [unique, not_null]
      - name: points
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 26
      - name: status
        tests:
          - accepted_values:
              values: ['Finished', 'DNF', 'DNS', 'Collision', 'Mechanical']
